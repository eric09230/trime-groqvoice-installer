# Rime schema settings
# encoding: utf-8
# 《Easy English — 英文滑動輸入用》
schema:
  schema_id: easy_english
  name: Easy English
  version: "202603"
  author:
    - 基於洋蔥英文字典
  description: |
    標準 QWERTY 英文輸入，搭配滑動輸入使用。
    含 QWERTY 鄰近鍵 fuzz 規則，提升滑動容錯率。

switches:
  - name: ascii_mode
    reset: 0
    states: [ " 中 ", " 英 " ]
  - name: simplification
    reset: 0
    states: [ " 原 ", " 简 " ]

engine:
  processors:
    # ascii_composer removed: ascii_mode=true is used for button label only,
    # keys must still go through speller → translator for English candidates
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator

menu:
  page_size: 9

speller:
  alphabet: "abcdefghijklmnopqrstuvwxyz,.-;/'"
  delimiter: "'"
  algebra:
    - derive|^([a-z]+)[;/]$|$1|

translator:
  dictionary: latinin1.extended
  prism: latinin1.extended
  enable_completion: true
  enable_encoder: false
  enable_sentence: false
  enable_user_dict: true
  disable_user_dict_for_patterns:
    - "^[a-z]$"

punctuator:
  half_shape:
    ',' : { commit: "," }
    '.' : { commit: "." }
    '<' : { commit: "<" }
    '>' : { commit: ">" }
    '?' : { commit: "?" }
    '/' : { commit: "/" }
    ':' : { commit: ":" }
    ';' : { commit: ";" }
    "'" : { commit: "'" }
    '"' : { commit: '"' }
    '\\' : { commit: "\\" }
    '|' : { commit: "|" }
    '`' : { commit: "`" }
    '~' : { commit: '~' }
    '!' : { commit: '!' }
    '@' : { commit: '@' }
    '#' : { commit: '#' }
    '%' : { commit: '%' }
    '$' : { commit: '$' }
    '^' : { commit: '^' }
    '&' : { commit: '&' }
    '*' : { commit: '*' }
    '(' : { commit: '(' }
    ')' : { commit: ')' }
    '_' : { commit: '_' }
    '-' : { commit: '-' }
    '+' : { commit: '+' }
    '=' : { commit: '=' }
    '[' : { commit: '[' }
    ']' : { commit: ']' }
    '{' : { commit: '{' }
    '}' : { commit: '}' }

key_binder:
  bindings:
    - {accept: comma, send: comma, when: has_menu}
    - {accept: comma, send: comma, when: paging}
    - {accept: period, send: period, when: has_menu}
    - {accept: period, send: period, when: paging}
    - {accept: minus, send: minus, when: has_menu}
    - {accept: minus, send: minus, when: paging}
    - {accept: Left, send: Page_Up, when: paging}
    - {accept: Right, send: Page_Down, when: paging}
    - {accept: Return, send: space, when: has_menu}
    # ascii_mode toggle — 讓 switch_ascii (Control+Shift+2) 也能切回中文
    - {accept: Control+Shift+2, toggle: ascii_mode, when: always}

editor:
  bindings:
    Shift+Return: commit_raw_input

recognizer:
  patterns:
    email: "^[A-Za-z][-_.0-9A-Za-z]*@.*$"
    url: "^(www[.]|https?:|ftp[.:]|mailto:|file:).*$|^[a-z]+[.].+$"
